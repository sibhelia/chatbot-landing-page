<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Book</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #root {
      width: 100%;
      height: 100%;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "framer": "/framer-mock.js",
        "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import InteractiveBook from 'https://framer.com/m/InteractiveBook-xGXc.js@uLOYl8huI2w4XDdONaRK';
    
    const root = createRoot(document.getElementById('root'));
    
    // Basit bir responsive boyutlandırma
    const isMobile = window.innerWidth < 1024;
    const bookWidth = isMobile ? 240 : 320;
    const bookHeight = isMobile ? 340 : 450;

    root.render(React.createElement(InteractiveBook, {
      frontCover: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400&h=550&fit=crop',
      backCover: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400&h=550&fit=crop',
      innerPages: [
        'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=400&h=550&fit=crop',
        'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=400&h=550&fit=crop'
      ],
      shadow: { color: "#000", opacity: 0.4, blur: 15, offsetX: 0, offsetY: 10, spread: 0 },
      width: bookWidth,
      height: bookHeight
    }));
  </script>
</body>
</html>
